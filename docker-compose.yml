# docker-compose.yml — Sistema self-hosted completo
# Todo corre en tu equipo. Único costo externo: APIs de IA (claves en .env).
# Nada se expone a internet salvo las llamadas salientes a las APIs.

services:
  # ── Capa de datos ──
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: content_factory
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory -d content_factory"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Sistema A: Radar de nichos ──
  radar:
    build: ./radar
    restart: unless-stopped
    env_file: .env
    environment:
      # Sobrescribe los valores de .env para usar hostnames internos de Docker
      DATABASE_URL: postgresql://factory:${POSTGRES_PASSWORD}@postgres:5432/content_factory
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - ./radar:/app
    command: python -m src.scheduler

  # ── Generación de imágenes (self-hosted, GPU local) ──
  imagegen:
    build: ./imagegen
    restart: unless-stopped
    volumes:
      - ./imagegen:/app
    ports:
      - "127.0.0.1:7860:7860"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s   # tiempo de sobra para cargar el modelo en GPU

  # ── Sistema B: Fábrica de contenido ──
  factory-worker:
    build: ./factory
    restart: unless-stopped
    init: true   # tini como PID 1: cosecha zombies de Chromium/ffmpeg que deja Remotion
    env_file: .env
    environment:
      DATABASE_URL: postgresql://factory:${POSTGRES_PASSWORD}@postgres:5432/content_factory
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      IMAGEGEN_URL: http://imagegen:7860
    depends_on:
      postgres:  { condition: service_healthy }
      redis:     { condition: service_healthy }
      imagegen:  { condition: service_healthy }
    volumes:
      - ./factory:/app
      - factory_node_modules:/app/remotion/node_modules
      - media:/data
    command: python3 -m src.worker

  factory-scheduler:
    build: ./factory
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      DATABASE_URL: postgresql://factory:${POSTGRES_PASSWORD}@postgres:5432/content_factory
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      IMAGEGEN_URL: http://imagegen:7860
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - ./factory:/app
      - factory_node_modules:/app/remotion/node_modules
      - media:/data
    command: python3 -m src.scheduler

  # ── Dashboard de revisión ──
  dashboard:
    build: ./dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://factory:${POSTGRES_PASSWORD}@postgres:5432/content_factory
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      - ./dashboard:/app
      - media:/data:ro
    ports:
      - "127.0.0.1:8080:8080"
    command: uvicorn src.main:app --host 0.0.0.0 --port 8080

volumes:
  pgdata:
  redisdata:
  factory_node_modules:   # protege node_modules del bind mount de ./factory:/app
  media:
    driver: local
    # Para apuntar a una ruta específica de tu disco (ej. un disco grande):
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /ruta/absoluta/en/tu/disco/media
